services:
  app:
    build: .
    ports:
      - "0.0.0.0:3100:3100"
    volumes:
      - ./.docker/data:/app/data
    environment:
      - SQLITE_PATH=/app/data/sqlite.db
    healthcheck:
      test: ["CMD", "bun", "-e", "const r = await fetch('http://localhost:3100/api/health'); if (!r.ok) process.exit(1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M
