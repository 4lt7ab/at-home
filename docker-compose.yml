services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: tab
      POSTGRES_PASSWORD: tab
      POSTGRES_DB: at_home
    ports:
      - "3101:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tab -d at_home"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  app:
    profiles: [app]
    build: .
    ports:
      - "0.0.0.0:3100:3100"
    environment:
      - DATABASE_URL=postgres://tab:tab@db:5432/at_home
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bun", "-e", "const r = await fetch('http://localhost:3100/api/health'); if (!r.ok) process.exit(1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
