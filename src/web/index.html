<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home Tasks</title>
    <!-- Flash-prevention: apply stored theme class before any rendering -->
    <script>
      (function() {
        var stored = localStorage.getItem('theme');
        if (stored === 'dark') {
          document.documentElement.classList.add('dark');
        } else if (stored === 'light') {
          document.documentElement.classList.remove('dark');
        } else {
          // auto mode: follow OS preference
          if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
          }
        }
      })();
    </script>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      /* ------------------------------------------------------------------ */
      /* Theme tokens (light defaults)                                      */
      /* ------------------------------------------------------------------ */
      :root {
        --color-bg: #f5f5f5;
        --color-surface: #fff;
        --color-surface-alt: #fafafa;
        --color-text: #1a1a1a;
        --color-text-secondary: #666;
        --color-text-muted: #888;
        --color-text-faint: #999;
        --color-text-faintest: #aaa;
        --color-border: #e0e0e0;
        --color-border-light: #e8e8e8;
        --color-border-lighter: #eee;
        --color-border-lightest: #f0f0f0;
        --color-accent: #3498db;
        --color-accent-bg: #eaf2fb;
        --color-danger: #c0392b;
        --color-danger-bright: #e74c3c;
        --color-success: #27ae60;
        --color-success-bg: #e8faf0;
        --color-warning: #f39c12;
        --color-warning-bg: #fef9e7;
        --color-muted-bg: #f0f0f0;
        --color-area: #5b6abf;
        --color-area-bg: #eef0ff;
        --color-input-border: #ddd;
        --color-overlay: rgba(0, 0, 0, 0.3);
        --color-shadow: rgba(0, 0, 0, 0.15);
        --color-nav-active-bg: #f0f0f0;
        --color-btn-text: #fff;
      }

      /* ------------------------------------------------------------------ */
      /* Dark theme overrides (explicit .dark class)                        */
      /* ------------------------------------------------------------------ */
      :root.dark {
        --color-bg: #1a1a2e;
        --color-surface: #16213e;
        --color-surface-alt: #1a2540;
        --color-text: #e0e0e0;
        --color-text-secondary: #a0a0a0;
        --color-text-muted: #888;
        --color-text-faint: #777;
        --color-text-faintest: #666;
        --color-border: #2a2a4a;
        --color-border-light: #252545;
        --color-border-lighter: #222244;
        --color-border-lightest: #1e1e3a;
        --color-accent: #5dade2;
        --color-accent-bg: #1a2d42;
        --color-danger: #e74c3c;
        --color-danger-bright: #ff6b6b;
        --color-success: #2ecc71;
        --color-success-bg: #1a3a2a;
        --color-warning: #f39c12;
        --color-warning-bg: #3a3020;
        --color-muted-bg: #2a2a4a;
        --color-area: #7b8acf;
        --color-area-bg: #1e2248;
        --color-input-border: #3a3a5a;
        --color-overlay: rgba(0, 0, 0, 0.6);
        --color-shadow: rgba(0, 0, 0, 0.4);
        --color-nav-active-bg: #2a2a4a;
        --color-btn-text: #fff;
      }

      /* ------------------------------------------------------------------ */
      /* Auto dark mode: when no explicit preference is set                 */
      /* (overridden when .dark class is present on :root)                  */
      /* ------------------------------------------------------------------ */
      @media (prefers-color-scheme: dark) {
        :root:not(.light) {
          --color-bg: #1a1a2e;
          --color-surface: #16213e;
          --color-surface-alt: #1a2540;
          --color-text: #e0e0e0;
          --color-text-secondary: #a0a0a0;
          --color-text-muted: #888;
          --color-text-faint: #777;
          --color-text-faintest: #666;
          --color-border: #2a2a4a;
          --color-border-light: #252545;
          --color-border-lighter: #222244;
          --color-border-lightest: #1e1e3a;
          --color-accent: #5dade2;
          --color-accent-bg: #1a2d42;
          --color-danger: #e74c3c;
          --color-danger-bright: #ff6b6b;
          --color-success: #2ecc71;
          --color-success-bg: #1a3a2a;
          --color-warning: #f39c12;
          --color-warning-bg: #3a3020;
          --color-muted-bg: #2a2a4a;
          --color-area: #7b8acf;
          --color-area-bg: #1e2248;
          --color-input-border: #3a3a5a;
          --color-overlay: rgba(0, 0, 0, 0.6);
          --color-shadow: rgba(0, 0, 0, 0.4);
          --color-nav-active-bg: #2a2a4a;
          --color-btn-text: #fff;
        }
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: var(--color-bg);
        color: var(--color-text);
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }

      /* Form element dark mode defaults */
      input, select, textarea {
        color: var(--color-text);
        background: var(--color-surface);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
